<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>Flood Height AR</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; font-family:sans-serif; background:#000; }

    #video {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
    }

    #canvas {
      position:absolute; inset:0;
      width:100%; height:100%;
      pointer-events:none;
    }

    #start-screen {
      position:absolute; inset:0;
      background:rgba(0,10,30,0.95);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:18px; padding:36px;
      text-align:center; z-index:30;
    }
    #start-screen h1 {
      color:white; font-size:26px;
      font-weight:700; line-height:1.3; margin:0;
    }
    #start-screen p {
      color:rgba(255,255,255,0.7);
      font-size:15px; line-height:1.6;
      max-width:280px; margin:0;
    }
    #start-btn {
      background:#1a5fa8; color:white;
      border:none; padding:16px 44px;
      border-radius:32px; font-size:18px;
      font-weight:700; cursor:pointer;
      margin-top:8px;
    }

    #ui {
      position:absolute; bottom:36px; left:50%;
      transform:translateX(-50%);
      display:none; flex-direction:column;
      align-items:center; gap:10px;
      z-index:20; width:92%;
    }
    #dots { display:flex; gap:7px; }
    .dot {
      width:8px; height:8px; border-radius:50%;
      background:rgba(255,255,255,0.25);
      transition:background 0.4s;
    }
    .dot.active { background:white; }
    #label {
      color:white; padding:10px 24px;
      border-radius:24px; font-size:18px;
      font-weight:700; text-align:center;
      background:rgba(26,95,168,0.9);
      transition:background 0.5s; max-width:320px;
    }
    #hint {
      color:white; font-size:13px;
      background:rgba(0,0,0,0.6);
      padding:6px 16px; border-radius:12px;
      text-align:center; max-width:320px; line-height:1.5;
    }
    #btn {
      background:white; border:none;
      padding:15px 40px; border-radius:32px;
      font-size:17px; font-weight:700;
      cursor:pointer; color:#0a1628;
    }
    #btn:active { transform:scale(0.97); }
    #btn:disabled { opacity:0.4; }
    #reset-btn {
      font-size:13px; color:rgba(255,255,255,0.6);
      background:none; border:none;
      cursor:pointer; padding:4px 12px;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="start-screen">
  <h1>Flood Height<br>AR Simulator</h1>
  <p>Stand about 1.5 m from a wall, door, or pillar. Point your camera at it and see how high floodwater can rise.</p>
  <p style="font-size:13px;color:rgba(255,255,255,0.4)">Camera access required. No photos are saved.</p>
  <button id="start-btn" onclick="startExperience()">Start experience</button>
</div>

<div id="ui">
  <div id="dots">
    <div class="dot" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
    <div class="dot" id="dot-4"></div>
  </div>
  <div id="label">Stand 1.5 m from a wall, door, or pillar</div>
  <div id="hint">Hold your phone upright and point at it. Tap below to raise the flood.</div>
  <button id="btn" onclick="nextLevel()">Raise flood level</button>
  <button id="reset-btn" onclick="resetAll()">Start over</button>
</div>

<script>
const levels = [
  {
    label: "Ankle-deep — 20 cm",
    hint: "Looks harmless... or is it? Most dangerous misconception: shallow flooding is safe!",
    color: "#1a9fd4",
    frac: 0.07
  },
  {
    label: "Knee-high — 60 cm",
    hint: "Typical in SG flash flood events. Walking is slow and tiring. Most cars are partially submerged at their doors.",
    color: "#1a9fd4",
    frac: 0.25
  },
  {
    label: "Waist-high — 100 cm",
    hint: "Bukit Timah Rd flash flood peak (2021). Vehicles stall. Walking is very difficult. Currents carry unseen debris and pathogens.",
    color: "#e8a020",
    frac: 0.40
  },
  {
    label: "Chest-high — 150 cm",
    hint: "Regional major floods: Jakarta 2020, KL 2021. Life-threatening for most adults; evacuation critical.",
    color: "#d63a2a",
    frac: 0.58
  },
  {
    label: "Catastrophic — 3.0 m",
    hint: "Typhoon Haiyan storm surge (2013). Above a typical room ceiling.",
    color: "#A32D2D",
    frac: 0.88
  },
];

let current = -1;
let animTarget = 0;
let animCurrent = 0;
let tiltX = 0;
let tiltZ = 0;
let rafId = null;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

async function startExperience() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
  } catch(e) {
    alert('Camera access is needed for this experience. Please allow camera access and try again.');
    return;
  }

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      await DeviceOrientationEvent.requestPermission();
    } catch(e) {}
  }

  window.addEventListener('deviceorientation', onOrientation);

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('ui').style.display = 'flex';

  rafId = requestAnimationFrame(drawLoop);
}

function onOrientation(e) {
  if (e.gamma !== null) tiltX = e.gamma / 90;
  if (e.beta !== null)  tiltZ = (e.beta - 90) / 90;
}

function drawLoop() {
  rafId = requestAnimationFrame(drawLoop);
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  if (animCurrent < 0.001 && current < 0) return;

  animCurrent += (animTarget - animCurrent) * 0.055;

  const waterH = animCurrent * h;
  const baseY  = h - waterH;

  const tiltOffsetX = tiltX * 28;
  const tiltOffsetZ = tiltZ * 18;
  const surfaceY    = baseY + tiltOffsetZ;

  const col = current >= 0 ? levels[current].color : levels[0].color;
  const hex  = col.replace('#','');
  const r    = parseInt(hex.slice(0,2),16);
  const g    = parseInt(hex.slice(2,4),16);
  const b    = parseInt(hex.slice(4,6),16);

  ctx.save();

  const bodyGrad = ctx.createLinearGradient(0, surfaceY, 0, h);
  bodyGrad.addColorStop(0, `rgba(${r},${g},${b},0.55)`);
  bodyGrad.addColorStop(1, `rgba(${r},${g},${b},0.72)`);

  const cp1x = w * 0.25 + tiltOffsetX;
  const cp2x = w * 0.75 + tiltOffsetX;
  const amplitude = 6 + animCurrent * 10;
  const t = Date.now() / 1200;
  const wave1 = Math.sin(t) * amplitude;
  const wave2 = Math.sin(t + Math.PI) * amplitude;

  ctx.beginPath();
  ctx.moveTo(0, surfaceY + wave1);
  ctx.bezierCurveTo(
    cp1x, surfaceY + wave2 - 8,
    cp2x, surfaceY + wave1 + 8,
    w, surfaceY + wave2
  );
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  const surfGrad = ctx.createLinearGradient(0, surfaceY - 10, 0, surfaceY + 18);
  surfGrad.addColorStop(0, `rgba(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)},0.0)`);
  surfGrad.addColorStop(0.4, `rgba(${Math.min(r+80,255)},${Math.min(g+80,255)},${Math.min(b+80,255)},0.55)`);
  surfGrad.addColorStop(1, `rgba(${r},${g},${b},0.0)`);

  ctx.beginPath();
  ctx.moveTo(0, surfaceY + wave1);
  ctx.bezierCurveTo(
    cp1x, surfaceY + wave2 - 8,
    cp2x, surfaceY + wave1 + 8,
    w, surfaceY + wave2
  );
  ctx.lineWidth = 3;
  ctx.strokeStyle = `rgba(${Math.min(r+100,255)},${Math.min(g+100,255)},${Math.min(b+100,255)},0.7)`;
  ctx.stroke();

  const shimmerX = (w * 0.3 + tiltOffsetX * 2) % w;
  const shimmerGrad = ctx.createLinearGradient(shimmerX - 60, 0, shimmerX + 60, 0);
  shimmerGrad.addColorStop(0, 'rgba(255,255,255,0)');
  shimmerGrad.addColorStop(0.5, 'rgba(255,255,255,0.12)');
  shimmerGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shimmerGrad;
  ctx.fillRect(0, surfaceY, w, waterH);

  if (current >= 0) {
    const lineY = surfaceY + wave1 * 0.5;
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, lineY);
    ctx.lineTo(w, lineY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = '500 13px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.textAlign = 'right';
    ctx.fillText(levels[current].label.split('—')[1]?.trim() || '', w - 16, lineY - 7);
  }

  ctx.restore();
}

function nextLevel() {
  if (current >= levels.length - 1) return;
  current++;
  const lvl = levels[current];

  animTarget = lvl.frac;
  document.getElementById('label').textContent = lvl.label;
  document.getElementById('label').style.background = lvl.color + 'dd';
  document.getElementById('hint').textContent = lvl.hint;

  for (let i = 0; i < levels.length; i++) {
    document.getElementById('dot-'+i).classList.toggle('active', i === current);
  }

  if (current === levels.length - 1) {
    document.getElementById('btn').textContent = 'Peak reached';
    document.getElementById('btn').disabled = true;
  }
}

function resetAll() {
  current = -1;
  animTarget = 0;
  document.getElementById('label').textContent = 'Stand 1.5 m from a wall, door, or pillar';
  document.getElementById('label').style.background = 'rgba(26,95,168,0.9)';
  document.getElementById('hint').textContent = 'Hold your phone upright and point at it. Tap below to raise the flood.';
  document.getElementById('btn').textContent = 'Raise flood level';
  document.getElementById('btn').disabled = false;
  for (let i = 0; i < levels.length; i++) {
    document.getElementById('dot-'+i).classList.remove('active');
  }
}
</script>
</body>
</html>
